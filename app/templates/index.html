<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamond Price Prediction</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #ffffff;
        }

        .subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            font-size: 13px;
            color: #aaa;
            font-weight: 500;
        }

        input, select {
            background: #2a2a2a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px 14px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            border-color: #666;
        }

        select option {
            background: #2a2a2a;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #ffffff;
            color: #000000;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.85; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .result {
            margin-top: 24px;
            padding: 20px;
            background: #2a2a2a;
            border-radius: 12px;
            text-align: center;
            display: none;
        }

        .result.show { display: block; }

        .result-label {
            font-size: 13px;
            color: #888;
            margin-bottom: 8px;
        }

        .result-price {
            font-size: 36px;
            font-weight: 700;
            color: #ffffff;
        }

        .error {
            margin-top: 16px;
            padding: 12px 16px;
            background: #2a1a1a;
            border: 1px solid #5a2a2a;
            border-radius: 8px;
            color: #ff6b6b;
            font-size: 13px;
            display: none;
        }

        .error.show { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>💎 Diamond Price Prediction</h1>
        <p class="subtitle">Enter diamond features to predict its price</p>

        <div class="form-grid">
            <div class="form-group">
                <label>Carat</label>
                <input type="number" id="carat" step="0.01" placeholder="0.89" />
            </div>

            <div class="form-group">
                <label>Cut</label>
                <select id="cut">
                    <option value="Fair">Fair</option>
                    <option value="Good">Good</option>
                    <option value="Very Good">Very Good</option>
                    <option value="Premium">Premium</option>
                    <option value="Ideal" selected>Ideal</option>
                </select>
            </div>

            <div class="form-group">
                <label>Color</label>
                <select id="color">
                    <option value="J">J</option>
                    <option value="I">I</option>
                    <option value="H">H</option>
                    <option value="G" selected>G</option>
                    <option value="F">F</option>
                    <option value="E">E</option>
                    <option value="D">D</option>
                </select>
            </div>

            <div class="form-group">
                <label>Clarity</label>
                <select id="clarity">
                    <option value="I1">I1</option>
                    <option value="SI2">SI2</option>
                    <option value="SI1" selected>SI1</option>
                    <option value="VS2">VS2</option>
                    <option value="VS1">VS1</option>
                    <option value="VVS2">VVS2</option>
                    <option value="VVS1">VVS1</option>
                    <option value="IF">IF</option>
                </select>
            </div>

            <div class="form-group">
                <label>Depth (%)</label>
                <input type="number" id="depth" step="0.1" placeholder="62.0" />
            </div>

            <div class="form-group">
                <label>Table (%)</label>
                <input type="number" id="table" step="0.1" placeholder="59.0" />
            </div>

            <div class="form-group">
                <label>X (mm)</label>
                <input type="number" id="x" step="0.01" placeholder="6.13" />
            </div>

            <div class="form-group">
                <label>Y (mm)</label>
                <input type="number" id="y" step="0.01" placeholder="6.07" />
            </div>

            <div class="form-group full-width">
                <label>Z (mm)</label>
                <input type="number" id="z" step="0.01" placeholder="3.78" />
            </div>
        </div>

        <button id="predict-btn" onclick="predict()">Predict Price</button>

        <div class="result" id="result">
            <div class="result-label">Estimated Price</div>
            <div class="result-price" id="price">$0</div>
        </div>

        <div class="error" id="error"></div>
    </div>

    <script>
        async function predict() {
            const btn = document.getElementById("predict-btn");
            const resultDiv = document.getElementById("result");
            const errorDiv = document.getElementById("error");
            const priceDiv = document.getElementById("price");

            resultDiv.classList.remove("show");
            errorDiv.classList.remove("show");
            btn.disabled = true;
            btn.textContent = "Predicting...";

            const payload = {
                carat: parseFloat(document.getElementById("carat").value),
                cut: document.getElementById("cut").value,
                color: document.getElementById("color").value,
                clarity: document.getElementById("clarity").value,
                depth: parseFloat(document.getElementById("depth").value),
                table: parseFloat(document.getElementById("table").value),
                x: parseFloat(document.getElementById("x").value),
                y: parseFloat(document.getElementById("y").value),
                z: parseFloat(document.getElementById("z").value)
            };

            try {
                const response = await fetch("/predict", {
                    method : "POST",
                    headers: { "Content-Type": "application/json" },
                    body   : JSON.stringify(payload)
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(JSON.stringify(err.detail));
                }

                const data = await response.json();
                priceDiv.textContent = `$${data.predicted_price.toLocaleString()}`;
                resultDiv.classList.add("show");

            }
            catch (err)
            {
                let errorMsg = "An error occurred.";
                try {
                    const errData = JSON.parse(err.message);
                    if (Array.isArray(errData))
                    {
                        errorMsg = errData.map(e => `${e.loc[1]}: ${e.msg}`).join("\n");
                    }
                    }
                catch
                {
                    errorMsg = err.message;
                }
                errorDiv.textContent = errorMsg;
                errorDiv.classList.add("show");
            }

            finally {
                btn.disabled = false;
                btn.textContent = "Predict Price";
            }
        }
    </script>
</body>
</html>
